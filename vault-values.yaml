global:
  enabled: true
  tlsDisable: false # Secure by default: Enforce TLS for all internal traffic

server:
  enabled: true
  replicas: 3

  dataStorage:
    enabled: true
    size: 5Gi
    storageClass: "local-storage" # Matches your local storage engine
    mountPath: "/mnt/disks/vault-data" # Consistent with your hostPath in PVs

  # Configure Vault's internal clustering architecture (Raft)
  ha:
    enabled: true
    replicas: 3
    raft:
      enabled: true
      setNodeId: true
      config: |
        ui = true

        listener "tcp" {
          tls_disable = 1 # We can let Kubernetes network boundaries handle internal encryption, or inject certs later
          address     = "[::]:8200"
          cluster_address = "[::]:8201"
        }

        storage "raft" {
          path = "/vault/data"
        }

  # Expose Vault via NodePort to keep our architecture consistent with Scenario B
  service:
    enabled: true
    type: NodePort
    nodePort: 32200 # Dedicated external entryway on your worker nodes for Vault UI/API
  