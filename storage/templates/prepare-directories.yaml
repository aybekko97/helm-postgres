{{- if and .Values.enabled .Values.prepareDirectories.enabled }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ .Release.Name }}-prepare-directories
  labels:
    app.kubernetes.io/name: local-storage-prepare-directories
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: local-storage-prepare-directories
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: local-storage-prepare-directories
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      {{- range .Values.nodes }}
                      - {{ . | quote }}
                      {{- end }}
      tolerations:
        - operator: Exists
      containers:
        - name: prepare-directories
          image: {{ .Values.prepareDirectories.image | quote }}
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
          args:
            - |
              {{- range .Values.pools }}
              mkdir -p "/host{{ .hostPath }}"
              chmod {{ $.Values.prepareDirectories.mode }} "/host{{ .hostPath }}"
              {{- end }}
              echo "Local storage directories prepared on $(hostname)"
              sleep infinity
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: host-root
              mountPath: /host
      volumes:
        - name: host-root
          hostPath:
            path: /
            type: Directory
{{- end }}
