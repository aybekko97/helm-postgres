enabled: true

prepareDirectories:
  enabled: true
  image: busybox:1.36
  mode: "0777"

nodes:
  - ip-10-0-10-244
  - ip-10-0-11-230
  - ip-10-0-12-6

pools:
  - name: postgres
    storageClassName: local-postgres
    size: 5Gi
    hostPath: /mnt/disks/postgres-data
  - name: prometheus
    storageClassName: local-prometheus
    size: 5Gi
    hostPath: /mnt/disks/prometheus-data
  - name: grafana
    storageClassName: local-grafana
    size: 2Gi
    hostPath: /mnt/disks/grafana-data
  - name: alertmanager
    storageClassName: local-alertmanager
    size: 2Gi
    hostPath: /mnt/disks/alertmanager-data
  - name: vault
    storageClassName: local-vault
    size: 5Gi
    hostPath: /mnt/disks/vault-data
