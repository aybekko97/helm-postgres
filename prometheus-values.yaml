prometheusOperator:
  enabled: true

# Core Prometheus Controller Settings
prometheus:
  enabled: true
  prometheusSpec:
    # Use your production local storage engine for metrics persistence
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: "local-storage"
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi
    storagePath: "/mnt/disks/prometheus-data"

    # CRITICAL: Ensures Prometheus looks across ALL namespaces (like 'aibek') 
    # to find PodMonitors and ServiceMonitors automatically.
    podMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelectorNilUsesHelmValues: false

# Grafana Dashboard Visualization Engine
grafana:
  enabled: true
  
  # Expose the Grafana Web UI via NodePort for your HAProxy edge boundary
  service:
    type: NodePort
    nodePort: 32300 # Dedicated port for Grafana interface access

  # Set up persistent storage so your custom dashboards aren't wiped on pod restarts
  persistence:
    enabled: true
    storageClassName: "local-storage"
    size: 2Gi
    mountPath: "/mnt/disks/grafana-data"
  
  extraVolumeMounts:
    - name: custom-grafana-plugins
      mountPath: "/var/lib/grafana/plugins"
  extraVolumes:
    - name: custom-grafana-plugins
      hostPath:
        path: "/mnt/disks/grafana-plugins"
        type: DirectoryOrCreate

  # Admin credentials for your first login
  adminPassword: "StrongAdminPassword123"

# Alertmanager Engine Settings
alertmanager:
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: "local-storage"
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 2Gi # Custom file mount paths mapped to the Alertmanager runner environment
    volumeMounts:
      - name: alertmanager-scratch
        mountPath: "/var/alertmanager/custom-scratch"
    volumes:
      - name: alertmanager-scratch
        hostPath:
          path: "/mnt/disks/alertmanager-scratch"
          type: DirectoryOrCreate
