{{- if not .Values.ingress.tls.certificate }}
{{- fail "ingress.tls.certificate is required; provide it through vault/private-values.yaml" }}
{{- end }}
{{- if not .Values.ingress.tls.privateKey }}
{{- fail "ingress.tls.privateKey is required; provide it through vault/private-values.yaml" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.ingress.tlsSecretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: vault
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
type: kubernetes.io/tls
data:
  tls.crt: {{ .Values.ingress.tls.certificate | quote }}
  tls.key: {{ .Values.ingress.tls.privateKey | quote }}
