
storage:
  className: local-storage
  size: 10Gi
  hostPath: /mnt/disks/postgres-data
  nodes:
    - ip-10-0-10-244
    - ip-10-0-11-230
    - ip-10-0-12-6

tls:
  certificate: "" 
  ca_certificate: ""
  privateKey: "#############"

db:
  replicas: 3
  version: "16"
  name: mydb
  user: myuser

network:
  nodePort: 31432

