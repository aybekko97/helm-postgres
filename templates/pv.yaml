{{- range $node := .Values.storage.nodes }}
{{- range $i := untilStep 1 6 1 }}
apiVersion: v1
kind: PersistentVolume
metadata:
  name: local-pv-{{ $node }}-{{ $i }}
spec:
  capacity:
    storage: 5Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: {{ $.Values.storage.className }}
  local:
    path: {{ $.Values.storage.hostPath }}
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - {{ $node }}
---
{{- end }}
{{- end }}